name: Update Benefits Data

on:
  schedule:
    # 매일 오전 10시 KST (= UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect benefits data
        env:
          YOUTH_CENTER_KEY: ${{ secrets.YOUTH_CENTER_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: node api-collector.js

      - name: Build benefits.json
        run: node buildBenefitsJson.mjs

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benefits.json
          git diff --staged --quiet || git commit -m "data: update benefits $(date +'%Y-%m-%d')"
          git push
